let state={},cur="Wireless",curYr=2022,activeView="overview",tChart=null,ovChart=null;

function deepCopy(o){return JSON.parse(JSON.stringify(o));}
function initState(){
  state={};
  Object.entries(RAW).forEach(([s,d])=>{state[s]={years:[...d.years],markets:deepCopy(d.markets),firms:deepCopy(d.firms)};});
}

function getOthers(sec,yr){
  const mkt=state[sec].markets[yr]||0;
  const known=Object.values(state[sec].firms).reduce((s,rv)=>s+(rv[yr]||0),0);
  return Math.max(0,Math.round((mkt-known)*10)/10);
}
function calcHHI(sec,yr){
  const t=state[sec].markets[yr]||0; if(!t) return 0;
  return Math.round(Object.values(state[sec].firms).reduce((s,rv)=>s+Math.pow((rv[yr]||0)/t*100,2),0));
}
function calcCR(sec,yr,n){
  const t=state[sec].markets[yr]||0; if(!t) return 0;
  return parseFloat(Object.values(state[sec].firms).map(rv=>rv[yr]||0).sort((a,b)=>b-a).slice(0,n).reduce((s,v)=>s+v/t*100,0).toFixed(1));
}
function hhiLabel(h){if(h<1000)return{text:"Unkonzentriert",color:"#15803D"};if(h<1800)return{text:"Mäßig",color:"#B45309"};if(h<2500)return{text:"Konzentriert",color:"#C2410C"};return{text:"Hochkonzentriert",color:"#B91C1C"};}

      <div style="font-size:18px;font-weight:500;color:${lc}">${hhi||'—'}</div>
      <div style="font-size:10px;color:${lc};margin-top:2px">${lt}</div>

      <div style="font-size:10px;color:var(--color-text-secondary);margin-top:2px">Anteil #1</div>
    </div>
  </div>`;

  const ctrlBar=`<div style="display:flex;align-items:center;gap:8px;padding:.5rem 1.25rem;background:var(--color-background-secondary);border-bottom:0.5px solid var(--color-border-tertiary);flex-wrap:wrap">

    <div style="display:flex;gap:4px;flex-wrap:wrap">${yrChips}</div>
    <span style="width:0.5px;height:14px;background:var(--color-border-tertiary)"></span>

function buildRank(){
  const t=state[cur].markets[curYr]||0;
  if(!t) return `<p style="font-size:12px;color:var(--color-text-secondary)">Kein Gesamtmarkt für ${curYr}. Bitte oben eingeben.</p>`;
  const firms=Object.entries(state[cur].firms).map(([n,rv])=>({n,v:rv[curYr]||0})).filter(x=>x.v>0).sort((a,b)=>b.v-a.v);
  const others=getOthers(cur,curYr);
  const all=[...firms];
  if(others>0) all.push({n:'Others (Residual)',v:others,isOth:true});
  const maxV=all[0]?.v||1;
  const col=COLORS[cur];
  let h=`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">${cur} · ${curYr} · Gesamtmarkt €${Math.round(t).toLocaleString('de-DE')}M · HHI und CR4 exkl. Others</div>`;
  all.forEach((f,i)=>{
    const sh=(f.v/t*100).toFixed(1);
    const w=Math.round(f.v/maxV*100);
    const bc=f.isOth?'#94A3B8':col;
    h+=`<div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">
      <div style="font-size:11px;color:var(--color-text-secondary);width:148px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0;${f.isOth?'font-style:italic':''}">${i+1}. ${f.n}</div>
      <div style="flex:1;background:var(--color-background-secondary);border-radius:2px;height:19px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${bc};display:flex;align-items:center;justify-content:flex-end;padding-right:5px">
          <span style="font-size:10px;font-weight:500;color:#fff;white-space:nowrap">${sh}%</span>
        </div>
      </div>
      <div style="font-size:10px;color:var(--color-text-secondary);width:68px;text-align:right;font-family:var(--font-mono);flex-shrink:0">€${Math.round(f.v).toLocaleString('de-DE')}M</div>
    </div>`;
  });
  if(others>0) h+=`<div style="background:var(--color-background-secondary);border-radius:8px;padding:.65rem .9rem;margin-top:8px;font-size:12px;color:var(--color-text-secondary);line-height:1.6"><strong style="color:var(--color-text-primary)">Others = Residual:</strong> €${Math.round(others).toLocaleString('de-DE')}M = Gesamtmarkt − Σ erfasste Firmen. Nicht in HHI/CR4.</div>`;
  return h;
}

function buildDB(){

  let h=`<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Umsätze editierbar · Others auto-kalkuliert · HHI/CR4 exkl. Others</div>
  <div style="overflow-x:auto">
  <table style="border-collapse:collapse;font-size:11px;min-width:100%">
  <thead><tr>
    <th style="font-size:10px;color:var(--color-text-secondary);padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;text-align:left;white-space:nowrap">Unternehmen</th>
    ${yrs.map(y=>`<th style="font-size:10px;color:var(--color-text-secondary);padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;text-align:right">${y}</th>`).join('')}
    <th style="font-size:10px;color:var(--color-text-secondary);padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-weight:500;text-align:right">Anteil ${curYr}</th>
    <th style="padding:4px 6px;border-bottom:0.5px solid var(--color-border-tertiary)"></th>
  </tr></thead><tbody>`;
  fnames.forEach(nm=>{
    const isBase=!!RAW[cur].firms[nm];
    const t=state[cur].markets[curYr]||0;
    const sh=t&&state[cur].firms[nm][curYr]?((state[cur].firms[nm][curYr]/t)*100).toFixed(1)+'%':'—';
    h+=`<tr>
      <td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;white-space:nowrap;color:${isBase?'var(--color-text-primary)':'#1D4ED8'}">${nm}${isBase?'':' <span style="font-size:9px;background:#DBEAFE;color:#1E40AF;padding:1px 4px;border-radius:4px">neu</span>'}</td>
      ${yrs.map(y=>{
        const v=state[cur].firms[nm][y]??'';
        const bv=RAW[cur].firms[nm]?.[y]??null;
        const mod=bv!==null&&v!==''&&Math.abs(parseFloat(v)-bv)>0.1;
        return `<td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary)"><input type="number" value="${v}" placeholder="—" data-nm="${nm}" data-yr="${y}" oninput="onCell(this)" style="font-size:11px;padding:2px 4px;border-radius:3px;border:0.5px solid ${mod?COLORS[cur]:'var(--color-border-tertiary)'};background:var(--color-background-primary);color:${mod?COLORS[cur]:'var(--color-text-primary)'};width:65px;text-align:right;font-family:var(--font-mono)"/></td>`;
      }).join('')}
      <td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;color:${sh!=='—'?COLORS[cur]:'var(--color-text-secondary)'};font-weight:${sh!=='—'?500:400};text-align:right;font-family:var(--font-mono)">${sh}</td>
      <td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary)"><button data-del="${nm}" onclick="delFirm(this)" style="font-size:10px;color:var(--color-text-secondary);cursor:pointer;padding:1px 4px;border:0.5px solid var(--color-border-tertiary);border-radius:3px;background:none">✕</button></td>
    </tr>`;
  });
  // Others row
  h+=`<tr style="opacity:.6"><td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;font-style:italic;color:var(--color-text-secondary)">Others (Residual — auto)</td>
    ${yrs.map(y=>{const o=getOthers(cur,y);return`<td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;color:var(--color-text-secondary);text-align:right;font-family:var(--font-mono)">${o>0?Math.round(o):'—'}</td>`;}).join('')}
    <td style="padding:3px 6px;border-bottom:0.5px solid var(--color-border-tertiary);font-size:11px;color:var(--color-text-secondary);text-align:right;font-family:var(--font-mono)">${(()=>{const t=state[cur].markets[curYr]||0,o=getOthers(cur,curYr);return t&&o?((o/t)*100).toFixed(1)+'%':'—';})()}</td><td></td>
  </tr></tbody></table></div>
  <div style="display:flex;gap:6px;align-items:center;margin-top:8px;flex-wrap:wrap;padding-top:8px;border-top:0.5px solid var(--color-border-tertiary)">
    <span style="font-size:11px;color:var(--color-text-secondary)">Neue Firma:</span>
    <input id="newNm" type="text" placeholder="Name..." style="font-size:12px;padding:3px 7px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);width:140px"/>
    ${yrs.map(y=>`<input id="nr${y}" type="number" placeholder="${y}" style="font-size:11px;padding:3px 5px;border-radius:6px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-primary);color:var(--color-text-primary);width:65px;text-align:right;font-family:var(--font-mono)"/>`).join('')}
    <button onclick="addFirm()" style="font-size:12px;padding:3px 10px;border-radius:6px;border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer">+ Hinzufügen</button>
  </div>`;
  return h;
}

function buildTrendPlaceholder(){
  return `<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Marktanteil-Entwicklung Top 5 · ${cur} · Datenlücken werden verbunden</div>
  <div id="trendLegend" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:8px"></div>
  <div style="position:relative;width:100%;height:260px"><canvas id="tChart" role="img" aria-label="Marktanteil Trendanalyse ${cur}">Marktanteil-Entwicklung der Top-5-Unternehmen in ${cur}.</canvas></div>`;
}

function buildLogic(){
  const t=state[cur].markets[curYr]||0,h=calcHHI(cur,curYr),n=Object.keys(state[cur].firms).length,o=getOthers(cur,curYr);
  const mk=v=>`<div style="background:var(--color-background-secondary);border-radius:8px;padding:.65rem .9rem;font-family:var(--font-mono);font-size:11px;line-height:1.7">${v}</div>`;
  return `<div style="font-size:11px;color:var(--color-text-secondary);margin-bottom:8px">Rechenlogik des Frameworks</div>
  <div style="display:grid;gap:8px">
    ${mk(`<strong style="font-family:var(--font-sans);font-size:12px">1. Datenbank (fix, editierbar)</strong><br>rev(Firma i, Jahr t) → zentrale Tabelle<br>${n} Firmen · ${state[cur].years.length} Jahre · ${cur}`)}
    ${mk(`<strong style="font-family:var(--font-sans);font-size:12px">2. Variable X (Gesamtmarkt)</strong><br>X(${cur}, ${curYr}) = €${t?Math.round(t).toLocaleString('de-DE'):'—'}M ← eine Zelle, alle Anteile referenzieren X`)}
    ${mk(`<strong style="font-family:var(--font-sans);font-size:12px">3. Dynamisches Others</strong><br>Others = X − Σ rev(i,t) = €${o?Math.round(o).toLocaleString('de-DE'):0}M<br>Sinkt automatisch wenn neue Firmen hinzukommen`)}
    ${mk(`<strong style="font-family:var(--font-sans);font-size:12px">4. Konzentrationsmetriken (excl. Others)</strong><br>share(i) = rev(i) ÷ X × 100<br>HHI = Σ share(i)² = <strong>${h||'n/v'}</strong> · ${hhiLabel(h).text}<br>CR4 = ${calcCR(cur,curYr,4)?calcCR(cur,curYr,4)+'%':'n/v'} · Noam = ${h&&n?Math.round(h/Math.sqrt(n)):'-'} (n=${n} Firmen)`)}
  </div>`;
}

function renderCharts(){
  if(activeView==='overview') renderOvChart();
  else if(activeView==='trend') renderTrendChart();
}

function renderOvChart(){
  const c=document.getElementById('ovChart'); if(!c) return;
  const yrs=[2019,2020,2021,2022,2023];
  const secs=Object.keys(MACRO);
  if(ovChart){ovChart.destroy();ovChart=null;}
  ovChart=new Chart(c,{type:'bar',
    data:{labels:yrs,datasets:secs.map(s=>({label:s,data:yrs.map(y=>MACRO[s][y]||null),backgroundColor:COLORS[s]||'#888',borderWidth:0}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>`${ctx.dataset.label}: €${Math.round(ctx.raw).toLocaleString('de-DE')}M`}}},
      scales:{x:{stacked:true,ticks:{font:{size:10}}},y:{stacked:true,ticks:{callback:v=>v>=1000?Math.round(v/1000)+'Mrd':v,font:{size:10}},grid:{color:'rgba(128,128,128,.1)'}}}}
  });
  const leg=document.getElementById('ovLegend');
  if(leg) leg.innerHTML=secs.map(s=>`<span style="display:flex;align-items:center;gap:3px;font-size:10px;color:var(--color-text-secondary)"><span style="width:8px;height:8px;border-radius:2px;background:${COLORS[s]||'#888'};display:inline-block;flex-shrink:0"></span>${s}</span>`).join('');
}

function renderTrendChart(){
  const c=document.getElementById('tChart'); if(!c) return;
  const firms=state[cur].firms,yrs=state[cur].years;
  const latestYr=yrs.includes(curYr)?curYr:yrs[yrs.length-1];
  const top5=Object.entries(firms).map(([n,rv])=>({n,v:rv[latestYr]||rv[Math.max(...Object.keys(rv).map(Number))]||0})).sort((a,b)=>b.v-a.v).slice(0,5).map(x=>x.n);
  const pal=[COLORS[cur],'#D97706','#15803D','#7C3AED','#64748B'];
  if(tChart){tChart.destroy();tChart=null;}
  const leg=document.getElementById('trendLegend');
  if(leg) leg.innerHTML=top5.map((n,i)=>`<span style="display:flex;align-items:center;gap:3px;font-size:11px;color:var(--color-text-secondary)"><span style="width:8px;height:8px;border-radius:2px;background:${pal[i]};display:inline-block;flex-shrink:0"></span>${n}</span>`).join('');
  tChart=new Chart(c,{type:'line',
    data:{labels:yrs,datasets:top5.map((nm,i)=>({label:nm,data:yrs.map(y=>{const t=state[cur].markets[y];return t&&firms[nm]?.[y]!=null?parseFloat((firms[nm][y]/t*100).toFixed(2)):null;}),borderColor:pal[i],backgroundColor:'transparent',tension:.35,pointRadius:3,borderWidth:2,pointBackgroundColor:pal[i],spanGaps:true}))},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{ticks:{callback:v=>v.toFixed(0)+'%',font:{size:10}},grid:{color:'rgba(128,128,128,.1)'}},x:{ticks:{font:{size:10},maxRotation:45,autoSkip:true,maxTicksLimit:12},grid:{display:false}}}}
  });
}

function attachEvents(){}

function setSec(s){cur=s;const yrs=state[s].years.filter(y=>state[s].markets[y]);curYr=yrs.includes(2022)?2022:yrs[yrs.length-1]||state[s].years[state[s].years.length-1];if(activeView==='overview')activeView='rank';if(tChart){tChart.destroy();tChart=null;}render();}
function setYr(y){curYr=y;if(tChart){tChart.destroy();tChart=null;}render();}
function setView(v){activeView=v;if(tChart&&v!=='trend'){tChart.destroy();tChart=null;}render();}
function onMkt(){const v=parseFloat(document.getElementById('mktInp')?.value);if(!isNaN(v)&&v>0){state[cur].markets[curYr]=v;const m=document.getElementById('mrow');if(m){const hhi=calcHHI(cur,curYr);const{text:lt,color:lc}=hhiLabel(hhi);const cr4=calcCR(cur,curYr,4);const cr1=calcCR(cur,curYr,1);const mc=m.querySelectorAll('[data-mc]');if(mc.length){}}}render();}
function rstMkt(){state[cur].markets[curYr]=RAW[cur].markets[curYr]||0;render();}
function togAddYr(){const r=document.getElementById('addYrRow');if(r)r.style.display=r.style.display==='flex'?'none':'flex';}
function addYr(){const y=parseInt(document.getElementById('ayrY')?.value);const m=parseFloat(document.getElementById('ayrM')?.value);if(!y||y<1900||y>2100)return;if(!state[cur].years.includes(y)){state[cur].years.push(y);state[cur].years.sort((a,b)=>a-b);}if(!isNaN(m)&&m>0)state[cur].markets[y]=m;curYr=y;render();}
function onCell(inp){const nm=inp.dataset.nm,yr=parseInt(inp.dataset.yr),v=parseFloat(inp.value);if(!isNaN(v)&&v>=0)state[cur].firms[nm][yr]=v;else delete state[cur].firms[nm][yr];render();}
function delFirm(btn){const nm=btn.dataset.del;delete state[cur].firms[nm];render();}
function addFirm(){const nm=document.getElementById('newNm')?.value.trim();if(!nm||state[cur].firms[nm])return;const revs={};state[cur].years.forEach(y=>{const v=parseFloat(document.getElementById('nr'+y)?.value||'');if(!isNaN(v)&&v>0)revs[y]=v;});if(!Object.keys(revs).length)return;state[cur].firms[nm]=revs;render();}

initState();
render();
</script>
